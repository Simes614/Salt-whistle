<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Salt Whistle Maintenance</title>
<style>
body{
font-family:Arial;
background:#f4f6f7;
margin:20px;
}

h1{
color:#1a5276;
}

button{
padding:10px;
margin:5px;
border:none;
background:#1a5276;
color:white;
border-radius:6px;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:8px;
box-shadow:0 2px 4px rgba(0,0,0,.1);
}

input{
padding:6px;
margin:4px;
}
</style>
</head>

<body>

<h1>Salt Whistle</h1>

<div class="card">
Owner: Rob Simonds & Dawn Wilson<br>
Boat: Catalina 34 MKII<br>
Hull: CYTP1651B303<br>
Engine: Universal M35B<br>
Engine Hours: <span id="hours">2013</span>
</div>

<button onclick="showDashboard()">Dashboard</button>
<button onclick="showSystems()">Systems</button>
<button onclick="showMaintenance()">Maintenance</button>
<button onclick="showSpares()">Spares</button>
<button onclick="showAddMaintenance()">Add Service</button>
<button onclick="exportPDF()">Export Log</button>

<div id="content"></div>

<script>

let systems = [
"Universal M35B Engine",
"Balmar XT-DT-170-J10 Alternator",
"Wakespeed WS500 Regulator",
"Victron MPPT 100/30",
"Victron Blue Smart Charger",
"2000W On Demand Inverter",
"Maxwell 500 Windlass",
"Oberdorfer Raw Water Pump",
"Raritan PHII Head",
"Jabsco 1950 Bilge Pump",
"Jabsco Par-Max 3 Shower Pump",
"Seaward 6 Gallon Water Heater",
"Garmin InReach Mini 2",
"ACR EPIRB",
"Lifesling 2",
"Highfield 250AL Dinghy",
"Mercury 3.3HP Outboard"
]

let maintenance = JSON.parse(localStorage.getItem("maintenance")) || [

{
date:"Nov 3 2025",
service:"Oil & Filter Change",
location:"Mazatlan",
mechanic:"Rafi"
},

{
date:"Jun 28 2025",
service:"Engine Zinc Replacement",
location:"Boat",
mechanic:"Rob"
},

{
date:"Feb 18 2026",
service:"Heat Exchanger Replacement & Coolant Change",
location:"Boat Yard",
mechanic:"Rob"
}

]

let spares = JSON.parse(localStorage.getItem("spares")) || [

{name:"Baldwin B179 Oil Filter",location:"Engine locker"},
{name:"Baldwin BF940 Fuel Filter",location:"Engine locker"},
{name:"Raw Water Impeller",location:"Engine spares bin"},
{name:"Alternator Belt",location:"Tool locker"},
{name:"Engine Zinc",location:"Parts bin"}

]

function saveData(){
localStorage.setItem("maintenance",JSON.stringify(maintenance))
localStorage.setItem("spares",JSON.stringify(spares))
}

function showDashboard(){

let html="<div class='card'><b>Maintenance Status</b><br><br>"

html+="Oil Change Completed Nov 2025<br>"
html+="Coolant Change Feb 2026<br>"
html+="Engine Hours: "+document.getElementById("hours").innerText

html+="</div>"

document.getElementById("content").innerHTML=html

}

function showSystems(){

let html="<div class='card'><b>Boat Systems</b><br><br>"

systems.forEach(s=>{
html+=s+"<br>"
})

html+="</div>"

document.getElementById("content").innerHTML=html

}

function showMaintenance(){

let html="<div class='card'><b>Maintenance Log</b><br><br>"

maintenance.forEach(m=>{
html+=m.date+" — "+m.service+" ("+m.location+" / "+m.mechanic+")<br>"
})

html+="</div>"

document.getElementById("content").innerHTML=html

}

function showSpares(){

let html="<div class='card'><b>Spares Inventory</b><br><br>"

spares.forEach(s=>{
html+=s.name+" — "+s.location+"<br>"
})

html+="</div>"

document.getElementById("content").innerHTML=html

}

function showAddMaintenance(){

let html="<div class='card'>"

html+="Date:<br><input id='d'><br>"
html+="Service:<br><input id='s'><br>"
html+="Location:<br><input id='l'><br>"
html+="Mechanic:<br><input id='m'><br>"

html+="<br><button onclick='addMaintenance()'>Save</button>"

html+="</div>"

document.getElementById("content").innerHTML=html

}

function addMaintenance(){

let entry={
date:document.getElementById("d").value,
service:document.getElementById("s").value,
location:document.getElementById("l").value,
mechanic:document.getElementById("m").value
}

maintenance.unshift(entry)

saveData()

showMaintenance()

}

function exportPDF(){

let text="Salt Whistle Maintenance Log\n\n"

maintenance.forEach(m=>{
text+=m.date+" - "+m.service+" ("+m.location+" / "+m.mechanic+")\n"
})

let blob=new Blob([text],{type:"text/plain"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="salt-whistle-maintenance.txt"
a.click()

}

showDashboard()

</script>

</body>
</html>
